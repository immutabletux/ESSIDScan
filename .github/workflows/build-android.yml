name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install build tools
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk ESSIDscan.1.0.1.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ESSIDscan-android
          path: ESSIDscan.1.0.1.apk

      - name: Attach APK to GitHub release v1.0.1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload v1.0.1 ESSIDscan.1.0.1.apk --clobber \
            --repo "${{ github.repository }}"
